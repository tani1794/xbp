<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Immersive Light Room</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Inter", "Noto Sans JP", system-ui, sans-serif;
      background: #02040a;
      color: #f7fbff;
    }

    body {
      cursor: grab;
      touch-action: none;
      background:
        radial-gradient(circle at 20% 20%, rgba(86, 170, 255, 0.18), transparent 24%),
        radial-gradient(circle at 80% 30%, rgba(255, 95, 185, 0.16), transparent 28%),
        radial-gradient(circle at 50% 70%, rgba(55, 255, 214, 0.12), transparent 32%),
        #02040a;
    }

    body:active {
      cursor: grabbing;
    }

    .stage {
      position: fixed;
      inset: 0;
      perspective: 1200px;
      overflow: hidden;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.03), transparent 55%),
        linear-gradient(135deg, #050814 0%, #02040a 55%, #02050d 100%);
    }

    .world {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 1px;
      height: 1px;
      transform-style: preserve-3d;
      will-change: transform;
    }

    .room {
      position: absolute;
      left: 0;
      top: 0;
      transform-style: preserve-3d;
    }

    .wall {
      position: absolute;
      width: 2200px;
      height: 2200px;
      left: -1100px;
      top: -1100px;
      overflow: hidden;
      transform-style: preserve-3d;
      background:
        radial-gradient(circle at 20% 30%, rgba(117, 194, 255, 0.18), transparent 20%),
        radial-gradient(circle at 70% 20%, rgba(255, 97, 173, 0.16), transparent 18%),
        radial-gradient(circle at 50% 70%, rgba(113, 255, 223, 0.15), transparent 22%),
        linear-gradient(180deg, rgba(10,14,28,0.95), rgba(4,7,18,0.92));
      box-shadow: inset 0 0 200px rgba(0,0,0,0.55);
    }

    .wall::before {
      content: "";
      position: absolute;
      inset: -10%;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,0.05), transparent 14%),
        radial-gradient(circle at 70% 60%, rgba(255,255,255,0.03), transparent 12%),
        radial-gradient(circle at 50% 50%, rgba(70, 170, 255, 0.09), transparent 30%);
      filter: blur(25px);
      mix-blend-mode: screen;
      animation: wallGlow 14s linear infinite alternate;
      opacity: 0.9;
    }

    .wall::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(0deg, rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 120px 120px;
      mask-image: radial-gradient(circle at center, black 0%, black 55%, transparent 90%);
      opacity: 0.28;
      animation: wallGrid 16s linear infinite;
    }

    .back   { transform: translateZ(-1100px); }
    .front  { transform: rotateY(180deg) translateZ(-1100px); }
    .left   { transform: rotateY(90deg) translateZ(-1100px); }
    .right  { transform: rotateY(-90deg) translateZ(-1100px); }
    .top    { transform: rotateX(-90deg) translateZ(-1100px); }
    .bottom {
      transform: rotateX(90deg) translateZ(-1100px);
      background:
        radial-gradient(circle at center, rgba(78, 215, 255, 0.22), transparent 22%),
        radial-gradient(circle at 70% 35%, rgba(255, 100, 170, 0.14), transparent 18%),
        linear-gradient(180deg, rgba(4,8,18,0.94), rgba(2,4,10,0.98));
    }

    .bottom::before {
      background:
        radial-gradient(circle at 50% 55%, rgba(70, 180, 255, 0.16), transparent 22%),
        radial-gradient(circle at 30% 30%, rgba(255, 130, 200, 0.10), transparent 16%),
        radial-gradient(circle at 70% 70%, rgba(90, 255, 220, 0.10), transparent 18%);
      filter: blur(12px);
      animation: floorFlow 10s ease-in-out infinite alternate;
      opacity: 1;
    }

    .bottom::after {
      background:
        linear-gradient(0deg, rgba(150,230,255,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(150,230,255,0.06) 1px, transparent 1px);
      background-size: 90px 90px;
      opacity: 0.34;
      animation: floorGrid 12s linear infinite;
    }

    .ceilingGlow {
      position: absolute;
      width: 1600px;
      height: 1600px;
      left: -800px;
      top: -800px;
      transform: rotateX(-90deg) translateZ(-1040px);
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(110, 200, 255, 0.10), transparent 35%),
        radial-gradient(circle at 55% 45%, rgba(255, 110, 180, 0.08), transparent 18%),
        radial-gradient(circle at 40% 60%, rgba(100, 255, 220, 0.08), transparent 18%);
      filter: blur(20px);
      opacity: 0.8;
      pointer-events: none;
      animation: ceilingPulse 8s ease-in-out infinite alternate;
    }

    .field, .ribbonField, .lanternField {
      position: absolute;
      left: 0;
      top: 0;
      transform-style: preserve-3d;
      pointer-events: none;
    }

    .petal {
      position: absolute;
      border-radius: 70% 30% 60% 40% / 40% 60% 40% 60%;
      transform-style: preserve-3d;
      mix-blend-mode: screen;
      opacity: 0.9;
      filter: blur(0.4px);
      box-shadow: 0 0 18px rgba(255,255,255,0.16);
      animation:
        petalFloat var(--dur) linear infinite,
        petalFlicker calc(var(--dur) * 0.45) ease-in-out infinite alternate;
    }

    .lantern {
      position: absolute;
      border-radius: 50%;
      transform-style: preserve-3d;
      background:
        radial-gradient(circle at 35% 35%, rgba(255,255,255,0.95), rgba(var(--rgb), 0.72) 18%, rgba(var(--rgb), 0.18) 55%, transparent 72%);
      mix-blend-mode: screen;
      filter: blur(0.6px);
      animation:
        lanternDrift var(--dur) ease-in-out infinite alternate,
        lanternBlink calc(var(--dur) * 0.38) ease-in-out infinite alternate;
      box-shadow: 0 0 32px rgba(255,255,255,0.08);
    }

    .ribbon {
      position: absolute;
      height: var(--h);
      width: var(--w);
      border-radius: 999px;
      transform-style: preserve-3d;
      background:
        linear-gradient(90deg,
          transparent 0%,
          rgba(var(--rgb), 0.00) 8%,
          rgba(var(--rgb), 0.24) 30%,
          rgba(255,255,255,0.30) 50%,
          rgba(var(--rgb), 0.24) 70%,
          rgba(var(--rgb), 0.00) 92%,
          transparent 100%);
      filter: blur(18px);
      mix-blend-mode: screen;
      opacity: 0.78;
      animation:
        ribbonMove var(--dur) ease-in-out infinite alternate,
        ribbonPulse calc(var(--dur) * 0.32) ease-in-out infinite alternate;
    }

    .hud {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 50;
      width: min(440px, calc(100% - 48px));
      padding: 20px 22px;
      border-radius: 26px;
      background: rgba(8, 13, 28, 0.40);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(20px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.30);
      user-select: none;
    }

    .hud .mini {
      display: inline-block;
      margin-bottom: 10px;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #c7efff;
      background: rgba(89, 175, 255, 0.12);
      border: 1px solid rgba(135, 210, 255, 0.16);
    }

    .hud h1 {
      font-size: clamp(28px, 5vw, 54px);
      line-height: 0.94;
      letter-spacing: -0.06em;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .hud p {
      font-size: 14px;
      line-height: 1.9;
      color: rgba(235, 244, 255, 0.76);
    }

    .marker {
      background: linear-gradient(transparent 52%, rgba(109, 211, 255, 0.32) 52%);
      padding-inline: 2px;
    }

    .guide {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 50;
      padding: 14px 16px;
      border-radius: 20px;
      background: rgba(8, 13, 28, 0.38);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(16px);
      color: rgba(239,245,255,0.72);
      font-size: 12px;
      line-height: 1.9;
      user-select: none;
    }

    .guide b {
      color: #fff;
    }

    .reticle {
      position: fixed;
      left: 50%;
      top: 50%;
      z-index: 35;
      width: 34px;
      height: 34px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      border-radius: 50%;
      border: 1px solid rgba(195, 233, 255, 0.20);
      opacity: 0.6;
    }

    .reticle::before,
    .reticle::after {
      content: "";
      position: absolute;
      background: rgba(195, 233, 255, 0.18);
    }

    .reticle::before {
      left: 16px;
      top: -9px;
      width: 1px;
      height: 52px;
    }

    .reticle::after {
      left: -9px;
      top: 16px;
      width: 52px;
      height: 1px;
    }

    .scanline {
      position: fixed;
      inset: 0;
      z-index: 30;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.015) 0px,
        rgba(255,255,255,0.015) 1px,
        transparent 3px,
        transparent 7px
      );
      mix-blend-mode: screen;
      opacity: 0.22;
    }

    .vignette {
      position: fixed;
      inset: 0;
      z-index: 25;
      pointer-events: none;
      background:
        radial-gradient(circle at center, transparent 38%, rgba(0,0,0,0.42) 100%),
        linear-gradient(to bottom, rgba(255,255,255,0.03), transparent 12%, transparent 82%, rgba(0,0,0,0.34));
    }

    .bloomLayer {
      position: fixed;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      overflow: hidden;
    }

    .bloom {
      position: absolute;
      left: 0;
      top: 0;
      width: var(--size);
      height: var(--size);
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background:
        radial-gradient(circle,
          rgba(255,255,255,0.75) 0%,
          rgba(var(--rgb),0.30) 26%,
          rgba(var(--rgb),0.12) 48%,
          transparent 72%);
      filter: blur(2px);
      mix-blend-mode: screen;
      animation: bloomExpand 1.7s ease-out forwards;
    }

    @keyframes wallGlow {
      0%   { transform: scale(1) translate3d(-20px, -10px, 0); }
      100% { transform: scale(1.06) translate3d(18px, 14px, 0); }
    }

    @keyframes wallGrid {
      0%   { transform: translate3d(0, 0, 0); }
      100% { transform: translate3d(-60px, -60px, 0); }
    }

    @keyframes floorFlow {
      0%   { transform: scale(1) translateY(0); }
      100% { transform: scale(1.06) translateY(14px); }
    }

    @keyframes floorGrid {
      0%   { transform: translate3d(0,0,0); }
      100% { transform: translate3d(60px,60px,0); }
    }

    @keyframes ceilingPulse {
      0%   { opacity: 0.55; transform: rotateX(-90deg) translateZ(-1040px) scale(1); }
      100% { opacity: 0.95; transform: rotateX(-90deg) translateZ(-1040px) scale(1.08); }
    }

    @keyframes petalFloat {
      0% {
        transform: translate3d(var(--x), var(--y), var(--z)) rotateZ(var(--r)) rotateY(0deg);
      }
      100% {
        transform: translate3d(calc(var(--x) + var(--dx)), calc(var(--y) + var(--dy)), calc(var(--z) + var(--dz)))
                   rotateZ(calc(var(--r) + 180deg)) rotateY(180deg);
      }
    }

    @keyframes petalFlicker {
      0%   { opacity: 0.42; }
      100% { opacity: 0.95; }
    }

    @keyframes lanternDrift {
      0% {
        transform: translate3d(var(--x), var(--y), var(--z)) scale(1);
      }
      100% {
        transform: translate3d(calc(var(--x) + var(--dx)), calc(var(--y) + var(--dy)), calc(var(--z) + var(--dz))) scale(1.12);
      }
    }

    @keyframes lanternBlink {
      0%   { opacity: 0.22; }
      100% { opacity: 0.92; }
    }

    @keyframes ribbonMove {
      0% {
        transform: translate3d(var(--x), var(--y), var(--z)) rotateX(var(--rx)) rotateY(var(--ry)) rotateZ(var(--rz));
      }
      100% {
        transform: translate3d(calc(var(--x) + var(--dx)), calc(var(--y) + var(--dy)), calc(var(--z) + var(--dz)))
                   rotateX(calc(var(--rx) + 12deg)) rotateY(calc(var(--ry) - 16deg)) rotateZ(calc(var(--rz) + 10deg));
      }
    }

    @keyframes ribbonPulse {
      0%   { opacity: 0.28; filter: blur(16px); }
      100% { opacity: 0.88; filter: blur(24px); }
    }

    @keyframes bloomExpand {
      0% {
        opacity: 0.0;
        transform: translate(-50%, -50%) scale(0.18);
      }
      12% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1.95);
      }
    }

    @media (max-width: 768px) {
      .hud {
        top: 16px;
        left: 16px;
        width: calc(100% - 32px);
        padding: 16px;
      }

      .guide {
        left: 16px;
        right: 16px;
        bottom: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="stage" id="stage">
    <section class="hud">
      <div class="mini">immersive art space / javascript</div>
      <h1>light garden<br>inside tokyo</h1>
      <p>
        宇宙空間から変更し、<span class="marker">チームラボのような没入型デジタルアート風</span>に寄せた360度空間です。
        ドラッグで視点を動かし、ホイールで距離を調整できます。
      </p>
    </section>

    <div class="reticle"></div>
    <div class="scanline"></div>

    <section class="world" id="world">
      <div class="room">
        <div class="wall back"></div>
        <div class="wall front"></div>
        <div class="wall left"></div>
        <div class="wall right"></div>
        <div class="wall top"></div>
        <div class="wall bottom"></div>
        <div class="ceilingGlow"></div>

        <div class="ribbonField" id="ribbonField"></div>
        <div class="lanternField" id="lanternField"></div>
        <div class="field" id="petalField"></div>
      </div>
    </section>

    <aside class="guide">
      <b>操作</b><br>
      Drag：視点移動<br>
      Wheel：ズーム<br>
      Double Click：リセット
    </aside>

    <div class="bloomLayer" id="bloomLayer"></div>
    <div class="vignette"></div>
  </main>

  <script>
    const stage = document.getElementById("stage");
    const world = document.getElementById("world");
    const petalField = document.getElementById("petalField");
    const ribbonField = document.getElementById("ribbonField");
    const lanternField = document.getElementById("lanternField");
    const bloomLayer = document.getElementById("bloomLayer");

    let rotateX = -4;
    let rotateY = 0;
    let targetX = -4;
    let targetY = 0;

    let zoom = 0;
    let targetZoom = 0;

    let isDragging = false;
    let lastX = 0;
    let lastY = 0;
    let lastBloomTime = 0;
    let idleMotion = true;

    const palette = [
      "108,209,255",
      "255,110,180",
      "112,255,220",
      "177,139,255",
      "255,177,98"
    ];

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function createPetals(count = 90) {
      for (let i = 0; i < count; i++) {
        const el = document.createElement("span");
        el.className = "petal";

        const w = rand(16, 34);
        const h = rand(26, 56);
        const x = rand(-900, 900);
        const y = rand(-700, 700);
        const z = rand(-1000, 1000);
        const dx = rand(-120, 120);
        const dy = rand(-180, 180);
        const dz = rand(-120, 120);
        const dur = rand(8, 18);
        const rot = rand(0, 360);
        const rgb = pick(palette);

        el.style.width = `${w}px`;
        el.style.height = `${h}px`;
        el.style.setProperty("--x", `${x}px`);
        el.style.setProperty("--y", `${y}px`);
        el.style.setProperty("--z", `${z}px`);
        el.style.setProperty("--dx", `${dx}px`);
        el.style.setProperty("--dy", `${dy}px`);
        el.style.setProperty("--dz", `${dz}px`);
        el.style.setProperty("--dur", `${dur}s`);
        el.style.setProperty("--r", `${rot}deg`);
        el.style.animationDelay = `${rand(-12, 0)}s`;

        el.style.background = `
          radial-gradient(circle at 35% 35%,
            rgba(255,255,255,0.95),
            rgba(${rgb},0.78) 20%,
            rgba(${rgb},0.24) 58%,
            transparent 74%)
        `;

        petalField.appendChild(el);
      }
    }

    function createLanterns(count = 26) {
      for (let i = 0; i < count; i++) {
        const el = document.createElement("span");
        el.className = "lantern";

        const size = rand(46, 130);
        const x = rand(-850, 850);
        const y = rand(-550, 550);
        const z = rand(-1000, 1000);
        const dx = rand(-80, 80);
        const dy = rand(-120, 120);
        const dz = rand(-80, 80);
        const dur = rand(7, 15);
        const rgb = pick(palette);

        el.style.width = `${size}px`;
        el.style.height = `${size}px`;
        el.style.setProperty("--x", `${x}px`);
        el.style.setProperty("--y", `${y}px`);
        el.style.setProperty("--z", `${z}px`);
        el.style.setProperty("--dx", `${dx}px`);
        el.style.setProperty("--dy", `${dy}px`);
        el.style.setProperty("--dz", `${dz}px`);
        el.style.setProperty("--dur", `${dur}s`);
        el.style.setProperty("--rgb", rgb);
        el.style.animationDelay = `${rand(-8, 0)}s`;

        lanternField.appendChild(el);
      }
    }

    function createRibbons(count = 12) {
      for (let i = 0; i < count; i++) {
        const el = document.createElement("span");
        el.className = "ribbon";

        const w = rand(500, 980);
        const h = rand(42, 92);
        const x = rand(-850, 850);
        const y = rand(-520, 520);
        const z = rand(-850, 850);
        const dx = rand(-160, 160);
        const dy = rand(-120, 120);
        const dz = rand(-140, 140);
        const rx = rand(-65, 65);
        const ry = rand(-180, 180);
        const rz = rand(-180, 180);
        const dur = rand(9, 18);
        const rgb = pick(palette);

        el.style.setProperty("--w", `${w}px`);
        el.style.setProperty("--h", `${h}px`);
        el.style.setProperty("--x", `${x}px`);
        el.style.setProperty("--y", `${y}px`);
        el.style.setProperty("--z", `${z}px`);
        el.style.setProperty("--dx", `${dx}px`);
        el.style.setProperty("--dy", `${dy}px`);
        el.style.setProperty("--dz", `${dz}px`);
        el.style.setProperty("--rx", `${rx}deg`);
        el.style.setProperty("--ry", `${ry}deg`);
        el.style.setProperty("--rz", `${rz}deg`);
        el.style.setProperty("--dur", `${dur}s`);
        el.style.setProperty("--rgb", rgb);
        el.style.animationDelay = `${rand(-10, 0)}s`;

        ribbonField.appendChild(el);
      }
    }

    function spawnBloom(x, y) {
      const bloom = document.createElement("span");
      bloom.className = "bloom";
      bloom.style.left = `${x}px`;
      bloom.style.top = `${y}px`;
      bloom.style.setProperty("--size", `${rand(90, 180)}px`);
      bloom.style.setProperty("--rgb", pick(palette));
      bloomLayer.appendChild(bloom);

      bloom.addEventListener("animationend", () => bloom.remove());
    }

    function updateWorld() {
      if (!isDragging && idleMotion) {
        const t = performance.now() * 0.00012;
        targetY += Math.sin(t) * 0.02;
      }

      rotateX += (targetX - rotateX) * 0.07;
      rotateY += (targetY - rotateY) * 0.07;
      zoom += (targetZoom - zoom) * 0.08;

      world.style.transform = `
        translate(-50%, -50%)
        translateZ(${zoom}px)
        rotateX(${rotateX}deg)
        rotateY(${rotateY}deg)
      `;

      requestAnimationFrame(updateWorld);
    }

    stage.addEventListener("pointerdown", (e) => {
      isDragging = true;
      idleMotion = false;
      lastX = e.clientX;
      lastY = e.clientY;
      stage.setPointerCapture(e.pointerId);
    });

    stage.addEventListener("pointermove", (e) => {
      if (isDragging) {
        const dx = e.clientX - lastX;
        const dy = e.clientY - lastY;

        targetY += dx * 0.16;
        targetX -= dy * 0.12;
        targetX = clamp(targetX, -55, 55);

        lastX = e.clientX;
        lastY = e.clientY;
      }

      const now = performance.now();
      if (now - lastBloomTime > 70) {
        spawnBloom(e.clientX, e.clientY);
        lastBloomTime = now;
      }
    });

    stage.addEventListener("pointerup", () => {
      isDragging = false;
      setTimeout(() => {
        idleMotion = true;
      }, 900);
    });

    stage.addEventListener("pointerleave", () => {
      isDragging = false;
      setTimeout(() => {
        idleMotion = true;
      }, 900);
    });

    stage.addEventListener("wheel", (e) => {
      e.preventDefault();
      targetZoom += e.deltaY * -0.45;
      targetZoom = clamp(targetZoom, -320, 360);
    }, { passive: false });

    stage.addEventListener("dblclick", () => {
      targetX = -4;
      targetY = 0;
      targetZoom = 0;
      idleMotion = true;
    });

    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();

      if (key === "arrowleft" || key === "a") targetY -= 7;
      if (key === "arrowright" || key === "d") targetY += 7;
      if (key === "arrowup" || key === "w") targetX = clamp(targetX + 5, -55, 55);
      if (key === "arrowdown" || key === "s") targetX = clamp(targetX - 5, -55, 55);

      if (key === "+" || key === "=") targetZoom = clamp(targetZoom + 35, -320, 360);
      if (key === "-" || key === "_") targetZoom = clamp(targetZoom - 35, -320, 360);

      if (key === "r") {
        targetX = -4;
        targetY = 0;
        targetZoom = 0;
      }
    });

    createRibbons();
    createLanterns();
    createPetals();
    updateWorld();

    for (let i = 0; i < 10; i++) {
      setTimeout(() => {
        spawnBloom(rand(0, window.innerWidth), rand(0, window.innerHeight));
      }, i * 140);
    }
  </script>
</body>
</html>
